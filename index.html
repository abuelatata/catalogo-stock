<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Catálogo Stock · Abuela Tata</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --oro:#d8b15f;
  --oro-suave:#f4ead2;
  --rosa:#f7e7e4;
  --texto:#3b2f2f;
  --blanco:#fffdf8;
  --borde:#e6d2a5;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--blanco);
  color:var(--texto);
}

header{
  position:sticky;
  top:0;
  z-index:50;
  background:linear-gradient(135deg,var(--rosa),var(--oro-suave));
  padding:12px;
  border-bottom:1px solid var(--borde);
}

h1{
  margin:0 0 8px;
  font-size:20px;
  text-align:center;
  color:var(--texto);
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.controls input,
.controls select,
.controls button{
  width:100%;
  padding:10px;
  border:1px solid var(--borde);
  border-radius:10px;
  font-size:15px;
  background:white;
}

.controls button{
  background:var(--oro);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.langs{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:8px;
}

.langs button{
  border:1px solid var(--borde);
  background:white;
  border-radius:999px;
  font-size:20px;
  padding:4px 10px;
  cursor:pointer;
}

main{
  padding:10px;
}

#catalogo{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}

.card{
  display:grid;
  grid-template-columns:92px 1fr;
  gap:8px;
  min-height:120px;
  padding:8px;
  border:1px solid var(--borde);
  border-radius:12px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,.04);
}

.card img{
  width:92px;
  height:112px;
  object-fit:contain;
  background:#faf7ef;
  border-radius:10px;
  border:1px solid #eee;
  cursor:pointer;
}

.info{
  min-width:0;
}

.ref{
  font-weight:bold;
  font-size:15px;
  color:#2d2424;
}

.desc{
  font-size:13px;
  margin:2px 0 5px;
  line-height:1.25;
}

.price{
  font-size:13px;
  font-weight:bold;
  color:#8b6b24;
  margin-bottom:4px;
}

.stock-table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

.stock-table th,
.stock-table td{
  border:1px solid #eadbb9;
  padding:3px;
  text-align:center;
}

.stock-table th{
  background:var(--oro-suave);
}

.empty{
  text-align:center;
  margin-top:30px;
  color:#777;
}

#viewer{
  display:none;
  position:fixed;
  inset:0;
  z-index:999;
  background:rgba(0,0,0,.88);
  align-items:center;
  justify-content:center;
  padding:15px;
}

#viewer img{
  max-width:100%;
  max-height:92vh;
  object-fit:contain;
}

#viewer span{
  position:absolute;
  top:15px;
  right:20px;
  color:white;
  font-size:36px;
  cursor:pointer;
}

@media(min-width:700px){
  #catalogo{
    grid-template-columns:1fr 1fr;
  }
}

@media(min-width:1050px){
  #catalogo{
    grid-template-columns:1fr 1fr 1fr;
  }
}

@media(max-width:480px){
  h1{font-size:18px}

  .controls{
    grid-template-columns:1fr;
  }

  .card{
    grid-template-columns:82px 1fr;
    min-height:108px;
    padding:7px;
  }

  .card img{
    width:82px;
    height:100px;
  }

  .desc{
    font-size:12px;
  }

  .stock-table{
    font-size:11px;
  }
}

@media print{
  header{display:none}
  main{padding:0}
  #catalogo{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5px;
  }
  .card{
    break-inside:avoid;
    box-shadow:none;
    min-height:95px;
    padding:5px;
  }
}
</style>
</head>

<body>

<header>
  <h1 id="title">Catálogo Stock Disponible</h1>

  <div class="controls">
    <input id="search" type="text" placeholder="Buscar referencia o descripción">
    <input id="familySearch" type="text" placeholder="Buscar familia: últimas 3 cifras">
    <select id="sort">
      <option value="referencia">Ordenar por referencia</option>
      <option value="familia">Ordenar por familia</option>
    </select>
    <button onclick="generarPDF()" id="pdfBtn">Generar PDF</button>
  </div>

  <div class="langs">
    <button onclick="setLang('es')">🇪🇸</button>
    <button onclick="setLang('en')">🇬🇧</button>
    <button onclick="setLang('fr')">🇫🇷</button>
    <button onclick="setLang('it')">🇮🇹</button>
  </div>
</header>

<main>
  <div id="catalogo"></div>
  <div id="empty" class="empty" style="display:none;">No hay resultados</div>
</main>

<div id="viewer" onclick="cerrarViewer()">
  <span>&times;</span>
  <img id="viewerImg" src="">
</div>

<script>
const SUPABASE_URL = "https://qoyrjhgjtydbcngfnyqn.supabase.co";
const SUPABASE_KEY = "sb_publishable_w1UF4CwiWSCD5Ykd5yejfw_O--zV3OL";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let productos = [];
let idioma = "es";

const textos = {
  es:{
    title:"Catálogo Stock Disponible",
    search:"Buscar referencia o descripción",
    family:"Buscar familia: últimas 3 cifras",
    pdf:"Generar PDF",
    ref:"Referencia",
    desc:"Descripción",
    price:"Precio",
    size:"Talla",
    stock:"Stock",
    empty:"No hay resultados"
  },
  en:{
    title:"Available Stock Catalogue",
    search:"Search reference or description",
    family:"Search family: last 3 digits",
    pdf:"Generate PDF",
    ref:"Reference",
    desc:"Description",
    price:"Price",
    size:"Size",
    stock:"Stock",
    empty:"No results found"
  },
  fr:{
    title:"Catalogue Stock Disponible",
    search:"Rechercher référence ou description",
    family:"Rechercher famille : 3 derniers chiffres",
    pdf:"Générer PDF",
    ref:"Référence",
    desc:"Description",
    price:"Prix",
    size:"Taille",
    stock:"Stock",
    empty:"Aucun résultat"
  },
  it:{
    title:"Catalogo Stock Disponibile",
    search:"Cerca referenza o descrizione",
    family:"Cerca famiglia: ultime 3 cifre",
    pdf:"Genera PDF",
    ref:"Referenza",
    desc:"Descrizione",
    price:"Prezzo",
    size:"Taglia",
    stock:"Stock",
    empty:"Nessun risultato"
  }
};

document.addEventListener("DOMContentLoaded", () => {
  cargarDatos();
  document.getElementById("search").addEventListener("input", render);
  document.getElementById("familySearch").addEventListener("input", render);
  document.getElementById("sort").addEventListener("change", render);
});

async function cargarDatos(){
  const { data, error } = await supabaseClient
    .from("stock_ceremonia26")
    .select("referencia, descripcion, precio, talla, stock")
    .gt("stock", 0)
    .order("referencia", { ascending:true });

  if(error){
    console.error(error);
    document.getElementById("catalogo").innerHTML =
      "<div class='empty'>Error cargando datos de Supabase</div>";
    return;
  }

  productos = agruparProductos(data || []);
  render();
}

function agruparProductos(data){
  const mapa = {};

  data.forEach(item => {
    const ref = String(item.referencia || "").trim();

    if(!mapa[ref]){
      mapa[ref] = {
        referencia: ref,
        descripcion: item.descripcion || "",
        precio: item.precio || "",
        familia: ref.slice(-3),
        imagen: `images/${ref}.jpg`,
        tallas: []
      };
    }

    mapa[ref].tallas.push({
      talla: item.talla,
      stock: item.stock
    });
  });

  return Object.values(mapa);
}

function render(){
  const q = document.getElementById("search").value.toLowerCase().trim();
  const familia = document.getElementById("familySearch").value.trim();
  const sort = document.getElementById("sort").value;

  let lista = productos.filter(p => {
    const coincideTexto =
      p.referencia.toLowerCase().includes(q) ||
      String(p.descripcion).toLowerCase().includes(q);

    const coincideFamilia =
      !familia || p.familia.includes(familia);

    return coincideTexto && coincideFamilia;
  });

  lista.sort((a,b) => {
    if(sort === "familia"){
      return a.familia.localeCompare(b.familia) || a.referencia.localeCompare(b.referencia);
    }
    return a.referencia.localeCompare(b.referencia);
  });

  const cont = document.getElementById("catalogo");
  const empty = document.getElementById("empty");

  cont.innerHTML = "";

  if(lista.length === 0){
    empty.style.display = "block";
    empty.textContent = textos[idioma].empty;
    return;
  }

  empty.style.display = "none";

  lista.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.imagen}" alt="${p.referencia}" loading="lazy"
           onerror="this.src=''; this.style.background='#f3eee1';"
           onclick="abrirViewer('${p.imagen}')">

      <div class="info">
        <div class="ref">${textos[idioma].ref}: ${p.referencia}</div>
        <div class="desc">${p.descripcion || ""}</div>
        <div class="price">${textos[idioma].price}: ${formatoPrecio(p.precio)}</div>

        <table class="stock-table">
          <thead>
            <tr>
              <th>${textos[idioma].size}</th>
              <th>${textos[idioma].stock}</th>
            </tr>
          </thead>
          <tbody>
            ${p.tallas.map(t => `
              <tr>
                <td>${t.talla}</td>
                <td>${t.stock}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;

    cont.appendChild(card);
  });
}

function formatoPrecio(precio){
  if(precio === "" || precio === null || precio === undefined) return "";
  const n = Number(precio);
  if(isNaN(n)) return precio;
  return n.toLocaleString("es-ES", { style:"currency", currency:"EUR" });
}

function abrirViewer(src){
  const viewer = document.getElementById("viewer");
  const img = document.getElementById("viewerImg");
  img.src = src;
  viewer.style.display = "flex";
}

function cerrarViewer(){
  document.getElementById("viewer").style.display = "none";
  document.getElementById("viewerImg").src = "";
}

function setLang(lang){
  idioma = lang;
  document.getElementById("title").textContent = textos[lang].title;
  document.getElementById("search").placeholder = textos[lang].search;
  document.getElementById("familySearch").placeholder = textos[lang].family;
  document.getElementById("pdfBtn").textContent = textos[lang].pdf;
  render();
}

async function generarPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4");

  const cards = Array.from(document.querySelectorAll(".card"));
  if(cards.length === 0) return;

  let x = 8;
  let y = 8;
  const cardW = 94;
  const cardH = 47;
  const gap = 4;

  for(let i = 0; i < cards.length; i++){
    const canvas = await html2canvas(cards[i], {
      scale: 1.5,
      useCORS: true,
      backgroundColor: "#ffffff"
    });

    const imgData = canvas.toDataURL("image/jpeg", 0.82);

    pdf.addImage(imgData, "JPEG", x, y, cardW, cardH);

    x += cardW + gap;

    if(x + cardW > 202){
      x = 8;
      y += cardH + gap;
    }

    if(y + cardH > 287 && i < cards.length - 1){
      pdf.addPage();
      x = 8;
      y = 8;
    }
  }

  pdf.save("catalogo-stock-abuelatata.pdf");
}
</script>

</body>
</html>
