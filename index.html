<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Stock · Abuela Tata</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --verde:#6f806b;
  --verde2:#52664d;
  --beige:#f8f2e8;
  --marfil:#fffdf8;
  --maquillaje:#dca88c;
  --texto:#3f3a34;
  --borde:#eadfce;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--marfil);
  color:var(--texto);
  font-family:Arial, sans-serif;
}

header{
  background:linear-gradient(135deg,#fbf4e9,#fffdf8);
  padding:26px 34px;
  border-bottom:1px solid var(--borde);
  display:flex;
  justify-content:space-between;
  gap:20px;
  align-items:center;
}

.brand{
  font-family:Georgia, serif;
  font-size:34px;
  font-style:italic;
  color:var(--verde);
}

.subtitle{
  font-size:13px;
  letter-spacing:3px;
  color:var(--maquillaje);
  text-transform:uppercase;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  border:0;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
  font-weight:bold;
}

.btn-main{
  background:var(--maquillaje);
  color:white;
}

.btn-soft{
  background:var(--verde);
  color:white;
}

.panel{
  padding:24px 34px;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 180px 180px 170px;
  gap:12px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:13px 14px;
  border:1px solid var(--borde);
  border-radius:10px;
  background:white;
}

.resumen{
  background:var(--beige);
  color:var(--verde2);
  border-radius:10px;
  padding:13px;
  text-align:center;
  font-weight:bold;
}

.catalogo{
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:18px;
}

.card{
  background:white;
  border:1px solid var(--borde);
  border-radius:18px;
  padding:14px;
  display:grid;
  grid-template-columns:42% 58%;
  gap:16px;
  min-height:230px;
  box-shadow:0 8px 22px rgba(92,73,54,.10);
}

.photo{
  background:var(--beige);
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  min-height:210px;
}

.photo img{
  width:100%;
  height:100%;
  max-height:230px;
  object-fit:contain;
  padding:6px;
}

.info{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-width:0;
}

.ref{
  font-family:Georgia, serif;
  color:var(--verde);
  font-size:26px;
  margin-bottom:4px;
}

.desc{
  font-family:Georgia, serif;
  font-size:20px;
  line-height:1.08;
  text-transform:uppercase;
  color:#3c352f;
  margin-bottom:8px;
  word-break:break-word;
}

.precio{
  display:inline-block;
  background:#fbf7ef;
  border:1px solid var(--borde);
  padding:6px 10px;
  border-radius:20px;
  color:var(--maquillaje);
  font-weight:bold;
  margin-bottom:10px;
  font-size:14px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  overflow:hidden;
  border-radius:10px;
}

th{
  background:#f5efe5;
  color:var(--verde2);
}

th,td{
  padding:6px;
  border-bottom:1px solid var(--borde);
  text-align:center;
}

tfoot td{
  background:#eef3ec;
  color:var(--verde2);
  font-weight:bold;
  font-size:15px;
}

.estado{
  margin-top:8px;
  color:var(--verde);
  font-size:13px;
  font-weight:bold;
}

.loading{
  grid-column:1/-1;
  text-align:center;
  padding:50px;
  color:var(--verde);
}

@media(max-width:900px){
  header{display:block}
  .actions{margin-top:18px}
  .panel{padding:18px}
  .filtros{grid-template-columns:1fr}
  .catalogo{grid-template-columns:1fr}
  .card{grid-template-columns:1fr}
  .photo{min-height:260px}
}

@media print{
  @page{
    size:A4 portrait;
    margin:8mm;
  }

  header{
    padding:0 0 7mm 0;
    margin-bottom:5mm;
    background:white;
  }

  .actions,
  .filtros{
    display:none!important;
  }

  .panel{
    padding:0;
  }

  .catalogo{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5mm;
  }

  .card{
    box-shadow:none;
    border:1px solid #ddd;
    border-radius:8px;
    padding:5mm;
    min-height:0;
    height:128mm;
    page-break-inside:avoid;
    break-inside:avoid;
    grid-template-columns:1fr;
    gap:3mm;
  }

  .photo{
    min-height:55mm;
    height:58mm;
    border-radius:6px;
  }

  .photo img{
    max-height:58mm;
    padding:2mm;
  }

  .ref{
    font-size:17pt;
  }

  .desc{
    font-size:12pt;
    max-height:28mm;
    overflow:hidden;
  }

  .precio{
    font-size:9pt;
    padding:3px 8px;
  }

  table{
    font-size:8.5pt;
  }

  th,td{
    padding:3px;
  }

  tfoot td{
    font-size:10pt;
  }

  .estado{
    display:none;
  }
}
</style>
</head>

<body>

<header>
  <div>
    <div class="brand">Abuela Tata</div>
    <div class="subtitle">Catálogo de stock disponible</div>
  </div>

  <div class="actions">
    <button class="btn-soft" onclick="window.scrollTo({top:0,behavior:'smooth'})">Inicio</button>
    <button class="btn-main" onclick="generarPDF()">Generar PDF</button>
  </div>
</header>

<section class="panel">
  <div class="filtros">
    <input id="buscar" placeholder="Buscar referencia o descripción..." oninput="pintar()">

    <select id="filtroTalla" onchange="pintar()">
      <option value="">Todas las tallas</option>
    </select>

    <select id="ordenar" onchange="pintar()">
      <option value="referencia">Ordenar por referencia</option>
      <option value="stock">Ordenar por stock</option>
    </select>

    <div class="resumen" id="stockTotal">Stock: 0 uds</div>
  </div>

  <div class="catalogo" id="contenedor">
    <div class="loading">Cargando catálogo...</div>
  </div>
</section>

<script>
const SUPABASE_URL = 'https://qoyrjhgjtydbcngfnyqn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_w1UF4CwiWSCD5Ykd5yejfw_O--zV3OL';
const TABLA = 'stock_ceremonia26';

const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let datos = [];
let agrupados = [];

async function cargarDatos(){
  const { data, error } = await cliente
    .from(TABLA)
    .select('referencia, descripcion, precio, talla, stock')
    .order('referencia', { ascending:true });

  if(error){
    document.getElementById('contenedor').innerHTML =
      '<div class="loading">Error cargando Supabase. Revisa la clave o permisos.</div>';
    console.error(error);
    return;
  }

  datos = data || [];
  prepararTallas();
  agrupar();
  pintar();
}

function prepararTallas(){
  const tallas = [...new Set(datos.map(x => x.talla).filter(Boolean))];
  tallas.sort((a,b)=>ordenTalla(a)-ordenTalla(b));

  const select = document.getElementById('filtroTalla');
  tallas.forEach(t=>{
    const op=document.createElement('option');
    op.value=t;
    op.textContent=t;
    select.appendChild(op);
  });
}

function ordenTalla(t){
  const s = String(t).toUpperCase().replace(/\s/g,'');
  const orden = {
    '3M':1,'6M':2,'9M':3,'12M':4,'18M':5,
    '2A':6,'2Y':6,'3A':7,'3Y':7,'4A':8,'4Y':8,
    '5A':9,'5Y':9,'6A':10,'6Y':10,'7A':11,'7Y':11,
    '8A':12,'8Y':12,'9A':13,'9Y':13,'10A':14,'10Y':14,
    '12A':15,'12Y':15
  };
  return orden[s] || 99;
}

function agrupar(){
  const mapa = {};

  datos.forEach(row=>{
    const ref = String(row.referencia || '').trim();
    if(!ref) return;

    if(!mapa[ref]){
      mapa[ref] = {
        referencia: ref,
        descripcion: row.descripcion || '',
        precio: row.precio || '',
        tallas: [],
        total: 0
      };
    }

    const stock = Number(row.stock || 0);

    if(stock > 0){
      mapa[ref].tallas.push({
        talla: row.talla,
        stock
      });

      mapa[ref].total += stock;
    }
  });

  agrupados = Object.values(mapa).filter(x=>x.total>0);

  agrupados.forEach(item=>{
    item.tallas.sort((a,b)=>ordenTalla(a.talla)-ordenTalla(b.talla));
  });
}

function pintar(){
  const contenedor = document.getElementById('contenedor');
  const buscar = document.getElementById('buscar').value.toLowerCase();
  const tallaFiltro = document.getElementById('filtroTalla').value;
  const ordenar = document.getElementById('ordenar').value;

  let lista = agrupados.filter(item=>{
    const coincideBusqueda =
      item.referencia.toLowerCase().includes(buscar) ||
      item.descripcion.toLowerCase().includes(buscar);

    const coincideTalla = !tallaFiltro ||
      item.tallas.some(t => t.talla === tallaFiltro && t.stock > 0);

    return coincideBusqueda && coincideTalla;
  });

  if(ordenar === 'stock'){
    lista.sort((a,b)=>b.total-a.total);
  }else{
    lista.sort((a,b)=>a.referencia.localeCompare(b.referencia));
  }

  const total = lista.reduce((sum,item)=>sum+item.total,0);
  document.getElementById('stockTotal').textContent =
    `${lista.length} refs · ${total} uds`;

  if(lista.length===0){
    contenedor.innerHTML = '<div class="loading">No hay artículos con esos filtros.</div>';
    return;
  }

  contenedor.innerHTML = lista.map(item => `
    <article class="card">
      <div class="photo">
        <img 
          src="images/${item.referencia}.jpg" 
          alt="${item.referencia}"
          onerror="this.src='https://placehold.co/600x600/f8f2e8/6f806b?text=${item.referencia}'"
        >
      </div>

      <div class="info">
        <div>
          <div class="ref">${item.referencia}</div>
          <div class="desc">${item.descripcion || 'Artículo disponible'}</div>
          <div class="precio">${formatoPrecio(item.precio)}</div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Talla</th>
              <th>Stock</th>
            </tr>
          </thead>
          <tbody>
            ${item.tallas.map(t=>`
              <tr>
                <td>${t.talla}</td>
                <td>${t.stock}</td>
              </tr>
            `).join('')}
          </tbody>
          <tfoot>
            <tr>
              <td>Total</td>
              <td>${item.total} uds</td>
            </tr>
          </tfoot>
        </table>

        <div class="estado">Disponible · Ceremonia 26</div>
      </div>
    </article>
  `).join('');
}

function formatoPrecio(precio){
  if(precio === null || precio === undefined || precio === '') return 'Precio no indicado';
  const n = Number(precio);
  if(isNaN(n)) return precio;
  return n.toLocaleString('es-ES', {style:'currency', currency:'EUR'});
}

function generarPDF(){
  window.print();
}

cargarDatos();
</script>

</body>
</html>
