<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Catálogo Stock · Abuela Tata</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --oro:#c9a24d;
  --oro-claro:#f4ead2;
  --rosa:#f8e8e5;
  --crema:#fffaf0;
  --texto:#3b2f2f;
  --gris:#7b6f6f;
  --borde:#ead9b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:radial-gradient(circle at top left,#fff4ef 0,#fffaf0 38%,#fff 100%);
  color:var(--texto);
}

header{
  position:sticky;
  top:0;
  z-index:50;
  padding:14px 12px 12px;
  background:rgba(255,250,240,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--borde);
  box-shadow:0 4px 18px rgba(120,90,40,.08);
}

h1{
  margin:0 0 12px;
  text-align:center;
  font-family:Georgia, "Times New Roman", serif;
  font-size:23px;
  color:#3b2f2f;
}

h1:after{
  content:"";
  display:block;
  width:78px;
  height:2px;
  margin:7px auto 0;
  background:linear-gradient(90deg,transparent,var(--oro),transparent);
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  max-width:980px;
  margin:0 auto;
}

.controls input,
.controls select{
  width:100%;
  height:43px;
  padding:0 13px;
  border:1px solid var(--borde);
  border-radius:16px;
  background:#fff;
  color:var(--texto);
  font-size:14px;
  outline:none;
}

.controls button{
  height:43px;
  border:0;
  border-radius:16px;
  background:linear-gradient(135deg,#c9a24d,#e0bd68);
  color:#fff;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
}

.langs{
  display:flex;
  justify-content:center;
  gap:9px;
  margin-top:11px;
}

.langs button{
  width:38px;
  height:34px;
  border:1px solid var(--borde);
  background:white;
  border-radius:999px;
  font-size:19px;
  cursor:pointer;
}

main{padding:12px}

#catalogo{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  max-width:1180px;
  margin:0 auto;
}

.card{
  position:relative;
  display:grid;
  grid-template-columns:88px 1fr;
  gap:9px;
  min-height:118px;
  padding:8px;
  border:1px solid var(--borde);
  border-radius:18px;
  background:rgba(255,255,255,.94);
  box-shadow:0 5px 16px rgba(80,55,20,.08);
  overflow:hidden;
}

.card:before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:5px;
  height:100%;
  background:linear-gradient(var(--rosa),var(--oro-claro),var(--oro));
}

.card img{
  width:88px;
  height:108px;
  object-fit:contain;
  background:linear-gradient(180deg,#fffaf3,#f4ead2);
  border-radius:14px;
  border:1px solid #eee2c7;
  cursor:pointer;
  padding:3px;
}

.info{min-width:0}

.ref{
  display:inline-block;
  padding:3px 8px;
  border-radius:999px;
  background:var(--oro-claro);
  font-weight:800;
  font-size:13px;
  margin-bottom:4px;
}

.desc{
  font-size:12.5px;
  line-height:1.25;
  margin:0 0 5px;
  color:#574747;
  max-height:32px;
  overflow:hidden;
}

.price{
  display:inline-block;
  font-size:12.5px;
  font-weight:800;
  color:#8b6b24;
  margin-bottom:5px;
}

.stock-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:11.5px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #eadbb9;
}

.stock-table th,
.stock-table td{
  padding:3px;
  text-align:center;
  border-bottom:1px solid #eee0c2;
}

.stock-table th{
  background:linear-gradient(180deg,#f8efd8,#f1dfb5);
  font-weight:800;
}

.stock-table tr:last-child td{border-bottom:0}

.stock-table td:last-child{
  font-weight:800;
  color:#7c5c18;
}

.empty{
  text-align:center;
  margin-top:35px;
  color:var(--gris);
  font-size:15px;
}

#viewer{
  display:none;
  position:fixed;
  inset:0;
  z-index:999;
  background:rgba(25,20,18,.92);
  align-items:center;
  justify-content:center;
  padding:18px;
}

#viewer img{
  max-width:100%;
  max-height:92vh;
  object-fit:contain;
  background:white;
  border-radius:18px;
  padding:8px;
}

#viewer span{
  position:absolute;
  top:14px;
  right:22px;
  color:white;
  font-size:38px;
  cursor:pointer;
}

@media(min-width:700px){
  #catalogo{grid-template-columns:1fr 1fr}
}

@media(min-width:1100px){
  #catalogo{grid-template-columns:1fr 1fr 1fr}
}

@media(max-width:480px){
  header{padding:11px 9px}
  h1{font-size:19px}

  .controls{
    grid-template-columns:1fr;
    gap:7px;
  }

  .controls input,
  .controls select,
  .controls button{
    height:40px;
    border-radius:14px;
    font-size:13.5px;
  }

  main{padding:8px}

  #catalogo{gap:8px}

  .card{
    grid-template-columns:78px 1fr;
    min-height:104px;
    padding:7px;
    border-radius:16px;
  }

  .card img{
    width:78px;
    height:96px;
  }

  .ref{font-size:12px}
  .desc{font-size:11.5px;max-height:28px}
  .price{font-size:11.5px}
  .stock-table{font-size:10.5px}

  .stock-table th,
  .stock-table td{padding:2px}
}
</style>
</head>

<body>

<header>
  <h1 id="title">Catálogo Stock Disponible</h1>

  <div class="controls">
    <input id="search" type="text" placeholder="Buscar referencia o descripción">
    <input id="familySearch" type="text" placeholder="Buscar familia: últimas 3 cifras">

    <select id="sort">
      <option value="referencia">Ordenar por referencia</option>
      <option value="familia">Ordenar por familia</option>
    </select>

    <button id="pdfBtn" onclick="generarPDF()">Generar PDF</button>
  </div>

  <div class="langs">
    <button onclick="setLang('es')">🇪🇸</button>
    <button onclick="setLang('en')">🇬🇧</button>
    <button onclick="setLang('fr')">🇫🇷</button>
    <button onclick="setLang('it')">🇮🇹</button>
  </div>
</header>

<main>
  <div id="catalogo"></div>
  <div id="empty" class="empty" style="display:none;">No hay resultados</div>
</main>

<div id="viewer" onclick="cerrarViewer()">
  <span>&times;</span>
  <img id="viewerImg" src="">
</div>

<script>
const SUPABASE_URL = "https://qoyrjhgjtydbcngfnyqn.supabase.co";
const SUPABASE_KEY = "sb_publishable_w1UF4CwiWSCD5Ykd5yejfw_O--zV3OL";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let productos = [];
let idioma = "es";

const textos = {
  es:{
    title:"Catálogo Stock Disponible",
    search:"Buscar referencia o descripción",
    family:"Buscar familia: últimas 3 cifras",
    pdf:"Generar PDF",
    ref:"Referencia",
    price:"Precio",
    size:"Talla",
    stock:"Stock",
    empty:"No hay resultados"
  },
  en:{
    title:"Available Stock Catalogue",
    search:"Search reference or description",
    family:"Search family: last 3 digits",
    pdf:"Generate PDF",
    ref:"Reference",
    price:"Price",
    size:"Size",
    stock:"Stock",
    empty:"No results found"
  },
  fr:{
    title:"Catalogue Stock Disponible",
    search:"Rechercher référence ou description",
    family:"Rechercher famille : 3 derniers chiffres",
    pdf:"Générer PDF",
    ref:"Référence",
    price:"Prix",
    size:"Taille",
    stock:"Stock",
    empty:"Aucun résultat"
  },
  it:{
    title:"Catalogo Stock Disponibile",
    search:"Cerca referenza o descrizione",
    family:"Cerca famiglia: ultime 3 cifre",
    pdf:"Genera PDF",
    ref:"Referenza",
    price:"Prezzo",
    size:"Taglia",
    stock:"Stock",
    empty:"Nessun risultato"
  }
};

document.addEventListener("DOMContentLoaded", () => {
  cargarDatos();
  document.getElementById("search").addEventListener("input", render);
  document.getElementById("familySearch").addEventListener("input", render);
  document.getElementById("sort").addEventListener("change", render);
});

async function cargarDatos(){
  const { data, error } = await supabaseClient
    .from("stock_ceremonia26")
    .select("referencia, descripcion, precio, talla, stock")
    .gt("stock", 0)
    .order("referencia", { ascending:true });

  if(error){
    console.error(error);
    document.getElementById("catalogo").innerHTML =
      "<div class='empty'>Error cargando datos de Supabase</div>";
    return;
  }

  productos = agruparProductos(data || []);
  render();
}

function agruparProductos(data){
  const mapa = {};

  data.forEach(item => {
    const ref = String(item.referencia || "").trim();

    if(!ref) return;

    if(!mapa[ref]){
      mapa[ref] = {
        referencia: ref,
        descripcion: item.descripcion || "",
        precio: item.precio || "",
        familia: ref.slice(-3),
        imagen: "images/" + ref + ".jpg",
        tallas: []
      };
    }

    mapa[ref].tallas.push({
      talla: item.talla,
      stock: item.stock
    });
  });

  Object.values(mapa).forEach(p => {
    p.tallas.sort((a,b) => ordenarTallas(a.talla,b.talla));
  });

  return Object.values(mapa);
}

function ordenarTallas(a,b){
  const orden = ["3M","6M","9M","12M","18M","2A","3A","4A","5A","6A","8A","10A","12A","14A","16A"];
  const aa = String(a).toUpperCase().replace(" ","");
  const bb = String(b).toUpperCase().replace(" ","");
  return orden.indexOf(aa) - orden.indexOf(bb);
}

function render(){
  const q = document.getElementById("search").value.toLowerCase().trim();
  const familia = document.getElementById("familySearch").value.trim();
  const sort = document.getElementById("sort").value;

  let lista = productos.filter(p => {
    const coincideTexto =
      p.referencia.toLowerCase().includes(q) ||
      String(p.descripcion).toLowerCase().includes(q);

    const coincideFamilia =
      !familia || p.familia.includes(familia);

    return coincideTexto && coincideFamilia;
  });

  lista.sort((a,b) => {
    if(sort === "familia"){
      return a.familia.localeCompare(b.familia) ||
             a.referencia.localeCompare(b.referencia);
    }
    return a.referencia.localeCompare(b.referencia);
  });

  const cont = document.getElementById("catalogo");
  const empty = document.getElementById("empty");

  cont.innerHTML = "";

  if(lista.length === 0){
    empty.style.display = "block";
    empty.textContent = textos[idioma].empty;
    return;
  }

  empty.style.display = "none";

  lista.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img 
        src="${p.imagen}" 
        alt="${p.referencia}" 
        loading="lazy"
        onclick="abrirViewer('${p.imagen}')"
        onerror="this.src=''; this.style.background='#f3eee1';"
      >

      <div class="info">
        <div class="ref">${textos[idioma].ref}: ${p.referencia}</div>
        <div class="desc">${p.descripcion || ""}</div>
        <div class="price">${textos[idioma].price}: ${formatoPrecio(p.precio)}</div>

        <table class="stock-table">
          <thead>
            <tr>
              <th>${textos[idioma].size}</th>
              <th>${textos[idioma].stock}</th>
            </tr>
          </thead>
          <tbody>
            ${p.tallas.map(t => `
              <tr>
                <td>${t.talla}</td>
                <td>${t.stock}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;

    cont.appendChild(card);
  });
}

function formatoPrecio(precio){
  if(precio === "" || precio === null || precio === undefined) return "";
  const n = Number(precio);
  if(isNaN(n)) return precio;
  return n.toLocaleString("es-ES", {
    style:"currency",
    currency:"EUR"
  });
}

function abrirViewer(src){
  document.getElementById("viewerImg").src = src;
  document.getElementById("viewer").style.display = "flex";
}

function cerrarViewer(){
  document.getElementById("viewer").style.display = "none";
  document.getElementById("viewerImg").src = "";
}

function setLang(lang){
  idioma = lang;
  document.getElementById("title").textContent = textos[lang].title;
  document.getElementById("search").placeholder = textos[lang].search;
  document.getElementById("familySearch").placeholder = textos[lang].family;
  document.getElementById("pdfBtn").textContent = textos[lang].pdf;
  render();
}

async function generarPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4");

  const cards = Array.from(document.querySelectorAll(".card"));
  if(cards.length === 0) return;

  let x = 6;
  let y = 6;

  const cardW = 96;
  const cardH = 45;
  const gap = 3;

  for(let i = 0; i < cards.length; i++){
    const canvas = await html2canvas(cards[i], {
      scale: 1.4,
      useCORS: true,
      backgroundColor: "#ffffff"
    });

    const imgData = canvas.toDataURL("image/jpeg", 0.82);
    pdf.addImage(imgData, "JPEG", x, y, cardW, cardH);

    x += cardW + gap;

    if(x + cardW > 204){
      x = 6;
      y += cardH + gap;
    }

    if(y + cardH > 291 && i < cards.length - 1){
      pdf.addPage();
      x = 6;
      y = 6;
    }
  }

  pdf.save("catalogo-stock-abuelatata.pdf");
}
</script>

</body>
</html>
