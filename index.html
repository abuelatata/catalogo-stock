<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Stock · Abuela Tata</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --verde:#6f806b;
  --verde2:#52664d;
  --beige:#f8f2e8;
  --marfil:#fffdf8;
  --maquillaje:#dca88c;
  --texto:#3f3a34;
  --borde:#eadfce;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--marfil);
  color:var(--texto);
  font-family:Arial, sans-serif;
}

header{
  background:linear-gradient(135deg,#fbf4e9,#fffdf8);
  padding:18px 28px;
  border-bottom:1px solid var(--borde);
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

.brand{
  font-family:Georgia, serif;
  font-size:32px;
  font-style:italic;
  color:var(--verde);
}

.subtitle{
  font-size:12px;
  letter-spacing:3px;
  color:var(--maquillaje);
  text-transform:uppercase;
}

.actions{
  display:flex;
  gap:10px;
}

button{
  border:0;
  border-radius:12px;
  padding:11px 16px;
  cursor:pointer;
  font-weight:bold;
}

.btn-main{
  background:var(--maquillaje);
  color:white;
}

.btn-soft{
  background:var(--verde);
  color:white;
}

.panel{
  padding:18px 28px;
}

.filtros{
  display:grid;
  grid-template-columns:1fr 170px 170px 160px;
  gap:10px;
  margin-bottom:16px;
}

input, select{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--borde);
  border-radius:10px;
  background:white;
}

.resumen{
  background:var(--beige);
  color:var(--verde2);
  border-radius:10px;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.catalogo{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card{
  background:white;
  border:1px solid var(--borde);
  border-radius:16px;
  padding:12px;
  display:grid;
  grid-template-columns:160px 1fr;
  gap:18px;
  min-height:150px;
  box-shadow:0 6px 18px rgba(92,73,54,.08);
  align-items:center;
}

.photo{
  background:var(--beige);
  border-radius:12px;
  height:135px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}

.photo.sin-foto::after{
  content:attr(data-ref);
  font-family:Georgia, serif;
  color:var(--verde);
  font-size:22px;
}

.ref{
  font-family:Georgia, serif;
  color:var(--verde);
  font-size:31px;
  line-height:1;
  margin-bottom:4px;
}

.desc{
  font-family:Georgia, serif;
  font-size:22px;
  line-height:1.05;
  text-transform:uppercase;
  color:#3c352f;
  margin-bottom:8px;
}

.precio{
  display:inline-block;
  background:#fbf7ef;
  border:1px solid var(--borde);
  padding:5px 12px;
  border-radius:20px;
  color:var(--maquillaje);
  font-weight:bold;
  font-size:16px;
  margin-bottom:8px;
}

.tallas-linea{
  font-size:16px;
  line-height:1.35;
  color:#4f463d;
  font-weight:bold;
}

.total-linea{
  margin-top:6px;
  font-size:15px;
  color:var(--verde2);
  font-weight:bold;
}

.loading{
  text-align:center;
  padding:50px;
  color:var(--verde);
}

@media(max-width:700px){
  header{
    display:block;
    padding:14px 16px;
  }

  .brand{
    font-size:27px;
  }

  .subtitle{
    font-size:10px;
  }

  .actions{
    margin-top:12px;
  }

  .panel{
    padding:12px;
  }

  .filtros{
    grid-template-columns:1fr;
  }

  .card{
    grid-template-columns:42% 58%;
    gap:12px;
    padding:12px;
    margin:0;
    min-height:190px;
  }

  .photo{
    height:170px;
  }

  .ref{
    font-size:28px;
  }

  .desc{
    font-size:20px;
  }

  .precio{
    font-size:16px;
  }

  .tallas-linea{
    font-size:15px;
  }
}

@media print{
  @page{
    size:A4 portrait;
    margin:8mm;
  }

  body{
    background:white;
  }

  header{
    position:static;
    padding:0 0 4mm 0;
    margin-bottom:3mm;
    background:white;
    border-bottom:1px solid #ddd;
  }

  .brand{
    font-size:22pt;
  }

  .subtitle{
    font-size:8pt;
  }

  .actions,
  .filtros{
    display:none!important;
  }

  .panel{
    padding:0;
  }

  .catalogo{
    gap:2mm;
  }

  .card{
    height:38mm;
    min-height:38mm;
    box-shadow:none;
    border:1px solid #ddd;
    border-radius:4mm;
    padding:2.5mm;
    display:grid;
    grid-template-columns:32mm 1fr;
    gap:4mm;
    page-break-inside:avoid;
    break-inside:avoid;
  }

  .photo{
    height:32mm;
    border-radius:3mm;
  }

  .ref{
    font-size:14pt;
    margin-bottom:0.5mm;
  }

  .desc{
    font-size:9pt;
    line-height:1.05;
    margin-bottom:1mm;
  }

  .precio{
    font-size:8pt;
    padding:0.8mm 2mm;
    margin-bottom:1mm;
  }

  .tallas-linea{
    font-size:7.4pt;
    line-height:1.18;
  }

  .total-linea{
    font-size:7.5pt;
    margin-top:1mm;
  }
}
</style>
</head>

<body>

<header>
  <div>
    <div class="brand">Abuela Tata</div>
    <div class="subtitle">Catálogo de stock disponible</div>
  </div>

  <div class="actions">
    <button class="btn-soft" onclick="window.scrollTo({top:0,behavior:'smooth'})">Inicio</button>
    <button class="btn-main" onclick="generarPDF()">Generar PDF</button>
  </div>
</header>

<section class="panel">
  <div class="filtros">
    <input id="buscar" placeholder="Buscar referencia o descripción..." oninput="pintar()">

    <select id="filtroTalla" onchange="pintar()">
      <option value="">Todas las tallas</option>
    </select>

    <select id="ordenar" onchange="pintar()">
      <option value="referencia">Ordenar por referencia</option>
      <option value="stock">Ordenar por stock</option>
    </select>

    <div class="resumen" id="stockTotal">Stock: 0 uds</div>
  </div>

  <div class="catalogo" id="contenedor">
    <div class="loading">Cargando catálogo...</div>
  </div>
</section>

<script>
const SUPABASE_URL = 'https://qoyrjhgjtydbcngfnyqn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_w1UF4CwiWSCD5Ykd5yejfw_O--zV3OL';
const TABLA = 'stock_ceremonia26';

const cliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let datos = [];
let agrupados = [];

async function cargarDatos(){
  const { data, error } = await cliente
    .from(TABLA)
    .select('referencia, descripcion, precio, talla, stock')
    .order('referencia', { ascending:true });

  if(error){
    document.getElementById('contenedor').innerHTML =
      '<div class="loading">Error cargando Supabase. Revisa la clave o permisos.</div>';
    console.error(error);
    return;
  }

  datos = data || [];
  prepararTallas();
  agrupar();
  pintar();
}

function prepararTallas(){
  const tallas = [...new Set(datos.map(x => x.talla).filter(Boolean))];
  tallas.sort((a,b)=>ordenTalla(a)-ordenTalla(b));

  const select = document.getElementById('filtroTalla');
  tallas.forEach(t=>{
    const op=document.createElement('option');
    op.value=t;
    op.textContent=t;
    select.appendChild(op);
  });
}

function ordenTalla(t){
  const s = String(t).toUpperCase().replace(/\s/g,'');
  const orden = {
    '3M':1,'6M':2,'9M':3,'12M':4,'18M':5,
    '2A':6,'2Y':6,'3A':7,'3Y':7,'4A':8,'4Y':8,
    '5A':9,'5Y':9,'6A':10,'6Y':10,'7A':11,'7Y':11,
    '8A':12,'8Y':12,'9A':13,'9Y':13,'10A':14,'10Y':14,
    '12A':15,'12Y':15
  };
  return orden[s] || 99;
}

function agrupar(){
  const mapa = {};

  datos.forEach(row=>{
    const ref = String(row.referencia || '').trim();
    if(!ref) return;

    if(!mapa[ref]){
      mapa[ref] = {
        referencia: ref,
        descripcion: row.descripcion || '',
        precio: row.precio || '',
        tallas: [],
        total: 0
      };
    }

    const stock = Number(row.stock || 0);

    if(stock > 0){
      mapa[ref].tallas.push({
        talla: row.talla,
        stock
      });
      mapa[ref].total += stock;
    }
  });

  agrupados = Object.values(mapa).filter(x=>x.total>0);

  agrupados.forEach(item=>{
    item.tallas.sort((a,b)=>ordenTalla(a.talla)-ordenTalla(b.talla));
  });
}

function pintar(){
  const contenedor = document.getElementById('contenedor');
  const buscar = document.getElementById('buscar').value.toLowerCase();
  const tallaFiltro = document.getElementById('filtroTalla').value;
  const ordenar = document.getElementById('ordenar').value;

  let lista = agrupados.filter(item=>{
    const coincideBusqueda =
      item.referencia.toLowerCase().includes(buscar) ||
      item.descripcion.toLowerCase().includes(buscar);

    const coincideTalla = !tallaFiltro ||
      item.tallas.some(t => t.talla === tallaFiltro && t.stock > 0);

    return coincideBusqueda && coincideTalla;
  });

  if(ordenar === 'stock'){
    lista.sort((a,b)=>b.total-a.total);
  }else{
    lista.sort((a,b)=>a.referencia.localeCompare(b.referencia));
  }

  const total = lista.reduce((sum,item)=>sum+item.total,0);
  document.getElementById('stockTotal').textContent =
    `${lista.length} refs · ${total} uds`;

  if(lista.length===0){
    contenedor.innerHTML = '<div class="loading">No hay artículos con esos filtros.</div>';
    return;
  }

  contenedor.innerHTML = lista.map(item => `
    <article class="card">
      <div class="photo">
        <img 
          src="images/${item.referencia}.jpg" 
          alt="${item.referencia}"
          onerror="this.style.display='none'; this.parentElement.classList.add('sin-foto'); this.parentElement.setAttribute('data-ref', '${item.referencia}')"
        >
      </div>

      <div class="info">
        <div class="ref">${item.referencia}</div>
        <div class="desc">${item.descripcion || 'Artículo disponible'}</div>
        <div class="precio">${formatoPrecio(item.precio)}</div>
        <div class="tallas-linea">${resumenTallas(item.tallas)}</div>
        <div class="total-linea">Stock total: ${item.total} uds</div>
      </div>
    </article>
  `).join('');
}

function resumenTallas(tallas){
  return tallas
    .filter(t => Number(t.stock) > 0)
    .map(t => `${t.talla}(${t.stock})`)
    .join(' · ');
}

function formatoPrecio(precio){
  if(precio === null || precio === undefined || precio === '') return 'Precio no indicado';
  const n = Number(precio);
  if(isNaN(n)) return precio;
  return n.toLocaleString('es-ES', {style:'currency', currency:'EUR'});
}

function generarPDF(){
  window.print();
}

cargarDatos();
</script>

</body>
</html>
