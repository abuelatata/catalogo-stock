<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Stock · Abuela Tata</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f7f2ec;color:#2b2b2b}
header{background:#fff;padding:22px;text-align:center;border-bottom:1px solid #e4d8cc}
.logo{font-size:30px;color:#8a633f;font-weight:bold}
.sub{color:#7b6b5d}
.controls{padding:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
input,button{padding:12px;border-radius:8px;border:1px solid #cdbba8}
button{background:#8a633f;color:white;cursor:pointer;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;padding:20px}
.card{background:white;border-radius:14px;padding:16px;box-shadow:0 4px 16px #0001}
.card img{width:100%;height:280px;object-fit:cover;border-radius:12px;background:#eee}
.ref{font-size:22px;font-weight:bold;margin-top:12px}
.desc{color:#6d5c4d;margin:6px 0 12px}
table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #e5ddd4;padding:8px;text-align:center}
th{background:#f1e8de}
.total{margin-top:12px;font-weight:bold;color:#8a633f}
#pdfArea{background:#fff}
.estado{text-align:center;padding:20px;color:#8a633f}
@media print{.controls{display:none}}
</style>
</head>

<body>

<header>
  <div class="logo">Abuela Tata</div>
  <div class="sub">Catálogo Stock Disponible</div>
</header>

<div class="controls">
  <input id="buscador" placeholder="Buscar referencia o descripción">
  <button onclick="cargarStock()">Actualizar stock</button>
  <button onclick="generarPDF()">Generar PDF</button>
</div>

<div id="estado" class="estado">Cargando stock...</div>

<div id="pdfArea">
  <div id="catalogo" class="grid"></div>
</div>

<script>
const SUPABASE_URL = "https://qoyrjhgjtydbcngfnyqn.supabase.co";
const SUPABASE_KEY = "sb_publishable_w1UF4CwiWSCD5Ykd5yejfw_O--zV3OL";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let articulos = [];

async function cargarStock(){
  document.getElementById("estado").innerText = "Cargando stock...";

  const { data, error } = await client
    .from("stock_ceremonia26")
    .select("referencia, descripcion, precio, talla, stock")
    .gt("stock", 0)
    .order("referencia", { ascending: true });

  if(error){
    document.getElementById("estado").innerText = "Error cargando stock: " + error.message;
    return;
  }

  const agrupado = {};

  data.forEach(item => {
    const ref = item.referencia;
    if(!agrupado[ref]){
      agrupado[ref] = {
        referencia: ref,
        descripcion: item.descripcion || "",
        precio: item.precio || "",
        tallas: [],
        total: 0
      };
    }
    agrupado[ref].tallas.push({
      talla: item.talla,
      stock: item.stock
    });
    agrupado[ref].total += Number(item.stock || 0);
  });

  articulos = Object.values(agrupado);
  pintarCatalogo();
}

function pintarCatalogo(){
  const texto = document.getElementById("buscador").value.toLowerCase();
  const contenedor = document.getElementById("catalogo");
  contenedor.innerHTML = "";

  const filtrados = articulos.filter(a =>
    a.referencia.toLowerCase().includes(texto) ||
    a.descripcion.toLowerCase().includes(texto)
  );

  document.getElementById("estado").innerText =
    filtrados.length + " artículos encontrados";

  filtrados.forEach(a => {
    const img = `images/${a.referencia}.jpg`;

    const filas = a.tallas.map(t =>
      `<tr><td>${t.talla}</td><td>${t.stock}</td></tr>`
    ).join("");

    contenedor.innerHTML += `
      <div class="card">
        <img src="${img}" onerror="this.src=''; this.style.display='none';">
        <div class="ref">${a.referencia}</div>
        <div class="desc">${a.descripcion}</div>
        <table>
          <thead>
            <tr><th>Talla</th><th>Unidades</th></tr>
          </thead>
          <tbody>${filas}</tbody>
        </table>
        <div class="total">Total: ${a.total} uds</div>
      </div>
    `;
  });
}

function generarPDF(){
  const elemento = document.getElementById("pdfArea");
  const opciones = {
    margin: 8,
    filename: "catalogo-stock-abuela-tata.pdf",
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
  };
  html2pdf().set(opciones).from(elemento).save();
}

document.getElementById("buscador").addEventListener("input", pintarCatalogo);
cargarStock();
</script>

</body>
</html>
